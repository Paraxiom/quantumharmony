version: '3.8'

# Production network connection - connects to live QuantumHarmony validators
# Usage: docker-compose -f docker-compose.production.yml up
#
# PQC Transport (ACTIVE):
#   PeerIds are derived from Falcon-1024 public keys (SHA3-256 hash).
#   These replaced Ed25519-derived PeerIds after PQC transport migration.
#
#   Falcon-derived PeerIds (Qm prefix = SHA2-256 multihash encoding):
#     Alice:   QmNVxWSGHMvTeLTHxZfd8WcWDSiEnQBVyZboaVqPc4y3ox
#     Bob:     QmeZwWcveZ5faSHYpJkiuCwx4wy7ByUUvn3rJhhQETWbYC
#     Charlie: QmQMjTeQZ56wV4nYGS2MAF2fM5tECQ2ETjGv6nsn5ESLMa

services:
  quantumharmony:
    image: quantumharmony:latest
    build:
      context: ..
      dockerfile: quantumharmony/Dockerfile.multinode
    container_name: quantumharmony-fullnode
    hostname: fullnode
    ports:
      - "9944:9944"
      - "30333:30333"
    volumes:
      - fullnode-data:/data
      - ./chainspec-production.json:/chainspec/chainspec-production.json:ro
    command: >
      --chain=/chainspec/chainspec-production.json
      --base-path=/data
      --name=docker-fullnode
      --unsafe-rpc-external
      --rpc-cors=all
      --rpc-methods=safe
      --port=30333
      --rpc-port=9944
      --bootnodes=/ip4/51.79.26.168/tcp/30333/p2p/QmeZwWcveZ5faSHYpJkiuCwx4wy7ByUUvn3rJhhQETWbYC
      --bootnodes=/ip4/209.38.225.4/tcp/30333/p2p/QmQMjTeQZ56wV4nYGS2MAF2fM5tECQ2ETjGv6nsn5ESLMa
      --bootnodes=/ip4/51.79.26.123/tcp/30333/p2p/QmNVxWSGHMvTeLTHxZfd8WcWDSiEnQBVyZboaVqPc4y3ox
    environment:
      - RUST_LOG=info,sync=debug
      # Uncomment to inject a pre-generated PQC identity:
      # - PQC_IDENTITY_KEY={"falcon_public_key":"0x...","falcon_secret_key":"0x..."}
    restart: unless-stopped
    # Uncomment to use Docker secrets for PQC identity:
    # secrets:
    #   - pqc_identity_key

volumes:
  fullnode-data:

# Uncomment to define Docker secrets:
# secrets:
#   pqc_identity_key:
#     file: ./secrets/pqc_identity_key.json

networks:
  default:
    driver: bridge
